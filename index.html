// Garment type -> show/hide mockup
document.getElementById('garmentType').addEventListener('change', function() {
  const mockup = document.getElementById('mockupSection');
  if(this.value === 'T-Shirt') {
    mockup.style.display = '';
    renderMockups();
  } else {
    mockup.style.display = 'none';
  }
});

// Re-render on any measurement input change
const watchIds = [
  'embFC_w','embFC_h','embFC_top','embFC_left','embFrontChestActive',
  'embBN_w','embBN_h','embBN_top','embBackNeckActive',
  'prtF_w','prtF_h','prtF_top','printFrontActive',
  'prtB_w','prtB_h','prtB_top','printBackActive',
];
watchIds.forEach(id => {
  const el = document.getElementById(id);
  if(el) el.addEventListener('change', renderMockups);
  if(el && el.type !== 'checkbox') el.addEventListener('input', renderMockups);
});

function n(id) { return parseFloat(document.getElementById(id)?.value) || 0; }
function checked(id) { return document.getElementById(id)?.checked; }

function renderMockups() {
  renderFront();
  renderBack();
}

// T-shirt canvas dimensions and key anchor points (tuned to image)
// Canvas: 500 x 580
// Garment body approx: x=80, y=70, w=340, h=420
// Collar bottom approx: y=100
// Shirt total height in cm reference: ~70cm
const SHIRT_BODY = { x: 80, y: 70, w: 340, h: 420 };
const COLLAR_Y = 100; // px where collar ends (top of chest area)
const SHIRT_CM_H = 70; // approximate shirt height in cm
const SHIRT_CM_W = 55; // approximate shirt width in cm

function cmToCanvasFront(widthCm, heightCm, topCm, leftCm) {
  // Convert cm measurements to canvas pixel positions
  const scaleX = SHIRT_BODY.w / SHIRT_CM_W;
  const scaleY = SHIRT_BODY.h / SHIRT_CM_H;
  const centerX = SHIRT_BODY.x + SHIRT_BODY.w / 2;
  
  const artW = widthCm * scaleX;
  const artH = heightCm * scaleY;
  const artTop = COLLAR_Y + (topCm * scaleY);
  const artLeft = leftCm > 0 ? (SHIRT_BODY.x + leftCm * scaleX) : (centerX - artW / 2);
  
  return { x: artLeft, y: artTop, w: artW, h: artH };
}

function drawAnnotation(ctx, x, y, w, h, label, topCm, widthCm) {
  const RED = '#e53935';
  ctx.save();
  ctx.strokeStyle = RED;
  ctx.fillStyle = RED;
  ctx.lineWidth = 1.5;
  ctx.font = 'bold 13px DM Sans, sans-serif';
  
  // Width arrow (horizontal, below artwork)
  const arrowY = y + h + 14;
  ctx.beginPath();
  ctx.moveTo(x, arrowY);
  ctx.lineTo(x + w, arrowY);
  ctx.stroke();
  // Arrow heads
  ctx.beginPath(); ctx.moveTo(x, arrowY-4); ctx.lineTo(x, arrowY+4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+w, arrowY-4); ctx.lineTo(x+w, arrowY+4); ctx.stroke();
  // Width label
  ctx.fillStyle = RED;
  ctx.textAlign = 'center';
  ctx.fillText(widthCm + ' cm', x + w/2, arrowY + 16);
  
  // Height arrow (vertical, from collar to artwork top)
  const arrowX = x - 18;
  const collarPx = COLLAR_Y;
  ctx.beginPath();
  ctx.moveTo(arrowX, collarPx);
  ctx.lineTo(arrowX, y);
  ctx.stroke();
  // Arrow heads
  ctx.beginPath(); ctx.moveTo(arrowX-4, collarPx); ctx.lineTo(arrowX+4, collarPx); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(arrowX-4, y); ctx.lineTo(arrowX+4, y); ctx.stroke();
  // Height label
  ctx.save();
  ctx.translate(arrowX - 14, collarPx + (y - collarPx)/2);
  ctx.rotate(-Math.PI/2);
  ctx.textAlign = 'center';
  ctx.fillText(topCm + ' cm', 0, 0);
  ctx.restore();
  
  // Placement box (dashed rect)
  ctx.setLineDash([4, 3]);
  ctx.strokeStyle = RED;
  ctx.strokeRect(x, y, w, h);
  ctx.setLineDash([]);
  
  // Label tag
  ctx.fillStyle = RED;
  ctx.fillRect(x, y - 20, ctx.measureText(label).width + 12, 18);
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';
  ctx.fillText(label, x + 6, y - 6);
  
  ctx.restore();
}

function renderFront() {
  const canvas = document.getElementById('mockupFront');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Draw t-shirt
  ctx.drawImage(tshirtImg, 0, 0, canvas.width, canvas.height);
  
  // Front Chest Embroidery
  if(checked('embFrontChestActive') && n('embFC_w') && n('embFC_top')) {
    const pos = cmToCanvasFront(n('embFC_w'), n('embFC_h')||2, n('embFC_top'), n('embFC_left'));
    drawAnnotation(ctx, pos.x, pos.y, pos.w, Math.max(pos.h, 20), 'Embroidery', n('embFC_top'), n('embFC_w'));
  }
  
  // Front Print
  if(checked('printFrontActive') && n('prtF_w') && n('prtF_top')) {
    const pos = cmToCanvasFront(n('prtF_w'), n('prtF_h')||10, n('prtF_top'), 0);
    drawAnnotation(ctx, pos.x, pos.y, pos.w, Math.max(pos.h, 30), 'Print', n('prtF_top'), n('prtF_w'));
  }
}

function renderBack() {
  const canvas = document.getElementById('mockupBack');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Draw t-shirt (mirrored for back view)
  ctx.save();
  ctx.scale(-1, 1);
  ctx.drawImage(tshirtImg, -canvas.width, 0, canvas.width, canvas.height);
  ctx.restore();
  
  // Back Neck Embroidery
  if(checked('embBackNeckActive') && n('embBN_w') && n('embBN_top')) {
    const pos = cmToCanvasFront(n('embBN_w'), n('embBN_h')||2, n('embBN_top'), 0);
    drawAnnotation(ctx, pos.x, pos.y, pos.w, Math.max(pos.h, 15), 'Back Neck', n('embBN_top'), n('embBN_w'));
  }
  
  // Back Print
  if(checked('printBackActive') && n('prtB_w') && n('prtB_top')) {
    const pos = cmToCanvasFront(n('prtB_w'), n('prtB_h')||10, n('prtB_top'), 0);
    drawAnnotation(ctx, pos.x, pos.y, pos.w, Math.max(pos.h, 30), 'Print', n('prtB_top'), n('prtB_w'));
  }
}

// Load image then render if T-Shirt already selected
tshirtImg.onload = function() {
  if(document.getElementById('garmentType').value === 'T-Shirt') renderMockups();
};
